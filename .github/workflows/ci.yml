name: CI

# Quality gate: type-check + unit tests on every PR and push, via the shared
# reusable workflow (also invoked by release.yml so the artifact is gated too).
# To make this a required check, enable branch protection for `master` and select
# the "quality / quality" job (repo-admin / owner step).
on:
  pull_request:
  push:
    branches:
      - master

jobs:
  quality:
    uses: ./.github/workflows/quality.yml
